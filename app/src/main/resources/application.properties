spring.application.name=inventory-app
# MongoDB URI - reads from DB_URI environment variable
spring.data.mongodb.uri=${DB_URI}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
client.url=${CLIENT_URL:http://localhost:4200}
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# Multipart file upload configuration for OCR invoice parsing
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OCR Provider Configuration
# Supported: aws-textract (default), chatgpt (gpt-4o-mini vision)
ocr.provider=chatgpt

# OpenAI API Key (required when ocr.provider=chatgpt)
# Set openai.api-key or OPENAI_API_KEY environment variable
openai.api-key=${OPENAI_API_KEY}
# AWS Textract Configuration (only needed when ocr.provider=aws-textract)
# Option 1: Use explicit credentials (uncomment and set your AWS credentials)
aws.access-key-id=${AWS_ACCESS_KEY}
aws.secret-access-key=${AWS_SECRET_ACCESS}
aws.region=${AWS_REGION}

# Option 2: Use environment variables (recommended for production)
# Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY environment variables
# Or use AWS credentials file at ~/.aws/credentials
# Or use IAM role if running on EC2/ECS

# Upload Token Configuration
upload.token.expiry.minutes=${UPLOAD_TOKEN_EXPIRY_MINUTES}