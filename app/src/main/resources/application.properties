# Application
spring.application.name=inventory-app
spring.data.mongodb.uri=${DB_URI}
client.url=${CLIENT_URL}

# Management
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# DevTools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# Multipart (OCR invoice upload)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OCR: aws-textract | chatgpt | gemini
ocr.provider=${OCR_PROVIDER}
ocr.openai.model=${OCR_OPENAI_MODEL}
ocr.gemini.model=${OCR_GEMINI_MODEL}

# OCR PREPROCESS: none (default, pass-through) | subprocess + (python-path and working-dir) | http + (url)
ocr.preprocess.mode=${OCR_PREPROCESS_MODE}
ocr.preprocess.url=${OCR_PREPROCESS_URL}
ocr.preprocess.python-path=${OCR_PREPROCESS_PYTHON_PATH}
ocr.preprocess.working-dir=${OCR_PREPROCESS_WORKING_DIR}

# API Keys (required for chosen provider)
openai.api-key=${OPENAI_API_KEY}
gemini.api-key=${GEMINI_API_KEY}

# AWS (required when ocr.provider=aws-textract)
aws.access-key-id=${AWS_ACCESS_KEY}
aws.secret-access-key=${AWS_SECRET_ACCESS}
aws.region=${AWS_REGION}

# Upload Images
upload.token.expiry.minutes=${UPLOAD_TOKEN_EXPIRY_MINUTES}

# Notification Service
notification.retry.base-delay-minutes=5
notification.retry.max-retries=3
notification.retry.interval-ms=60000
notification.retry.batch-size=50
notification.executor.core-pool-size=2
notification.executor.max-pool-size=5
notification.executor.queue-capacity=100
notification.email.provider=${NOTIFICATION_EMAIL_PROVIDER:noop}
notification.email.from=${NOTIFICATION_EMAIL_FROM:}
notification.email.api-key=${RESEND_API_KEY:}
notification.sms.provider=noop
notification.whatsapp.provider=${NOTIFICATION_WHATSAPP_PROVIDER:noop}
notification.whatsapp.api-token=${WHATSAPP_API_TOKEN:}
notification.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
notification.whatsapp.api-base-url=${WHATSAPP_API_BASE_URL:https://graph.facebook.com/v22.0}
notification.whatsapp.login-to=${NOTIFICATION_WHATSAPP_LOGIN_TO:}