# Application
spring.application.name=inventory-app
spring.data.mongodb.uri=${DB_URI}
client.url=${CLIENT_URL}

# Management
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
#management.metrics.mongo.connectionpool.enabled=true

# Async (@Async): bounded pool (avoid unbounded threads from SimpleAsyncTaskExecutor)
async.core-pool-size=${ASYNC_CORE_POOL_SIZE:4}
async.max-pool-size=${ASYNC_MAX_POOL_SIZE:16}
async.queue-capacity=${ASYNC_QUEUE_CAPACITY:500}

# QR / invoice image OCR runs on a dedicated small pool (bytes + APIs stay bounded)
ocr.executor.core-size=${OCR_EXECUTOR_CORE_SIZE:2}
ocr.executor.max-size=${OCR_EXECUTOR_MAX_SIZE:4}
ocr.executor.queue-capacity=${OCR_EXECUTOR_QUEUE_CAPACITY:100}

# SSE: close idle connections instead of indefinite retention (milliseconds)
sse.emitter-timeout-ms=${SSE_EMITTER_TIMEOUT_MS:1800000}

# Multipart (OCR invoice upload)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OCR: aws-textract | chatgpt | gemini
ocr.provider=${OCR_PROVIDER}
ocr.openai.model=${OCR_OPENAI_MODEL}
ocr.gemini.model=${OCR_GEMINI_MODEL}

# OCR PREPROCESS: none (default, pass-through) | subprocess + (python-path and working-dir) | http + (url)
ocr.preprocess.mode=${OCR_PREPROCESS_MODE}
ocr.preprocess.url=${OCR_PREPROCESS_URL}
ocr.preprocess.python-path=${OCR_PREPROCESS_PYTHON_PATH}
ocr.preprocess.working-dir=${OCR_PREPROCESS_WORKING_DIR}

# API Keys (required for chosen provider)
openai.api-key=${OPENAI_API_KEY}
gemini.api-key=${GEMINI_API_KEY}

# AWS (required when ocr.provider=aws-textract)
aws.access-key-id=${AWS_ACCESS_KEY}
aws.secret-access-key=${AWS_SECRET_ACCESS}
aws.region=${AWS_REGION}

# Upload Images
upload.token.expiry.minutes=${UPLOAD_TOKEN_EXPIRY_MINUTES}

# Plan (trial period for new shops)
plan.trial-days=${PLAN_TRIAL_DAYS:30}

# Notifications (email via Resend)
messaging.dispatch-interval-ms=${MESSAGING_DISPATCH_INTERVAL_MS:15000}
messaging.email.enabled=${MESSAGING_EMAIL_ENABLED:false}
messaging.email.api-key=${RESEND_API_KEY}
messaging.email.from-email=${RESEND_FROM_EMAIL}
messaging.email.from-name=${RESEND_FROM_NAME}