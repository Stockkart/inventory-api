spring.application.name=inventory-app
# MongoDB URI - reads from DB_URI environment variable
spring.data.mongodb.uri=${DB_URI}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
cross.origin.url=${CLIENT_URL:http://localhost:4200}
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# Multipart file upload configuration for OCR invoice parsing
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

